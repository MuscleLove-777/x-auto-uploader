name: X Auto Upload

on:
  schedule:
    # 毎日 JST 12:00 (UTC 3:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-oauthlib gdown pytrends

      - name: Download uploaded log
        continue-on-error: true
        run: |
          gh run download --name uploaded-log --dir . 2>/dev/null || echo "No previous log found"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run upload (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GDRIVE_FOLDER_ID_FRIDAY: ${{ secrets.GDRIVE_FOLDER_ID_FRIDAY }}
          GDRIVE_FOLDER_ID_DEFAULT: ${{ secrets.GDRIVE_FOLDER_ID_DEFAULT }}
        run: python upload.py

      - name: Wait before retry 2
        if: steps.attempt1.outcome == 'failure'
        run: echo "Attempt 1 failed. Waiting 60s..." && sleep 60

      - name: Run upload (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GDRIVE_FOLDER_ID_FRIDAY: ${{ secrets.GDRIVE_FOLDER_ID_FRIDAY }}
          GDRIVE_FOLDER_ID_DEFAULT: ${{ secrets.GDRIVE_FOLDER_ID_DEFAULT }}
        run: python upload.py

      - name: Wait before retry 3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: echo "Attempt 2 failed. Waiting 120s..." && sleep 120

      - name: Run upload (attempt 3)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GDRIVE_FOLDER_ID_FRIDAY: ${{ secrets.GDRIVE_FOLDER_ID_FRIDAY }}
          GDRIVE_FOLDER_ID_DEFAULT: ${{ secrets.GDRIVE_FOLDER_ID_DEFAULT }}
        run: python upload.py

      - name: LINE notify on failure
        if: steps.attempt1.outcome == 'failure' && (steps.attempt2.outcome == 'failure' || steps.attempt2.outcome == 'skipped') && (steps.attempt3.outcome == 'failure' || steps.attempt3.outcome == 'skipped')
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"⚠️ X(Twitter)自動投稿が3回リトライしても失敗しました\\n\\n時刻: $(TZ=Asia/Tokyo date +%Y-%m-%d\ %H:%M\ JST)\\nログ: https://github.com/MuscleLove-777/x-auto-uploader/actions/runs/${{ github.run_id }}\"
              }]
            }"

      - name: LINE notify on success
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          RETRY_INFO=""
          if [ "${{ steps.attempt2.outcome }}" = "success" ]; then RETRY_INFO="（2回目で成功）"; fi
          if [ "${{ steps.attempt3.outcome }}" = "success" ]; then RETRY_INFO="（3回目で成功）"; fi
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"✅ X(Twitter)自動投稿 成功${RETRY_INFO}\\n時刻: $(TZ=Asia/Tokyo date +%Y-%m-%d\ %H:%M\ JST)\"
              }]
            }"